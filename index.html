<!DOCTYPE html>
<html>

<head>

    <title>Bulb Toggle</title>
    <style>
        body {
            background-color: rgb(234, 238, 247);
        }

        .title {
            color: rgb(48, 48, 112);
            text-align: center;
            font-size: 40px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .container {
            height: 400px;
            width: 400px;
            background-color: rgb(197, 216, 244);
            text-align: center;
            margin-left: 440px;
            border-radius: 18px;
            margin-top: 40px;

        }

        .img-bulb {
            margin-top: 30px;
            height: 180px;
            width: 180px;
        }

        .on {
            background-color: green;
            height: 35px;
            width: 100px;
            border-radius: 17px;
            border: none;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-size: 17px;
            box-shadow: 2px 2px 2px grey;
            cursor: pointer;
            padding-bottom: px;
        }

        .on:hover {
            transform: scale(1.1);
        }

        .off {
            background-color: red;
            height: 35px;
            width: 100px;
            border-radius: 17px;
            border: none;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-size: 17px;
            box-shadow: 2px 2px 2px gray;
            cursor: pointer;
            padding-bottom: 2px;
        }

        .off:hover {
            transform: scale(1.1);
        }

        .sub-container {
            display: flex;
            flex-direction: row;
            justify-content: space-around;
            margin-top: 80px;
            align-items: center;
        }

        .circle {
            height: 20px;
            width: 20px;
            border-radius: 50%;
            margin-right: 8px;
            margin-top: 3px;
        }
    </style>
</head>

<body>
    <h2 class="title">Bulb Toggle</h2>
    <div class="container">
        <img src="off.bulb.jpg" class="img-bulb" id="bulb">
        <div class="sub-container">
            <button type="button" class="off" onclick="bulbOff()"> <img src="off.bulb.jpg" class="circle">
                OFF</button>
            <button type="button" class="on" onclick="bulbOn()"><img src="1015b5f5f662f1cbc4dcdeffa3ca78b7.jpg" 
                        class="circle">ON</button>
        </div>
    </div>
    <script>
        const bulbElement = document.getElementById('bulb');
        function bulbOn() {
            bulbElement.src = "1015b5f5f662f1cbc4dcdeffa3ca78b7.jpg";
        }
        function bulbOff() {
            bulbElement.src = "off.bulb.jpg";
        }
    </script>
</body>

</html>
